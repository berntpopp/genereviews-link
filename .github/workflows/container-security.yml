name: Container security

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: genereview-link:scan

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: genereview-link:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          sarif_file: trivy-results.sarif
        if: always() && !github.event.repository.private

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: genereview-link:scan
          format: cyclonedx
          output: genereview-link-sbom.cdx.json
          exit-code: "0"

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-security-artifacts
          path: genereview-link-sbom.cdx.json
