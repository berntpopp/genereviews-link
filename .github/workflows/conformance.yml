name: mcp-conformance
on:
  pull_request:
  push:
    branches: [main, master]
permissions:
  contents: read
concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true
jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CONFORMANCE_NAME: genereviews-link   # serverInfo.name
      CONFORMANCE_TIER: stateless
      MCP_PORT: "8000"                    # docker-compose host port
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync --group dev
      - name: Pre-seed the reviewed corpus artifact
        # The corpus is a restored database and genereview-corpus-restore has no egress, so
        # the exact digest-pinned data release must be staged before the stack starts. This
        # is the same hook the central container-ci smoke gate runs.
        run: |
          set -euo pipefail
          export GF_SMOKE_FIXTURE_DIR="$RUNNER_TEMP/smoke-fixtures"
          export GF_SMOKE_ENV_FILE="$RUNNER_TEMP/smoke.env"
          mkdir -p "$GF_SMOKE_FIXTURE_DIR"
          : > "$GF_SMOKE_ENV_FILE"
          bash docker/ci-prepare-smoke.sh
          cat "$GF_SMOKE_ENV_FILE" >> "$GITHUB_ENV"
      - name: Build & start server
        run: make docker-build && make docker-up
      - name: Wait for health
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${MCP_PORT}/health"; then
              break
            fi
            sleep 2
          done
      - name: Run conformance probe
        env:
          CONFORMANCE_MCP_URL: http://127.0.0.1:${{ env.MCP_PORT }}
        run: uv run pytest tests/conformance/test_transport_v1.py -v
      - name: Logs on failure
        if: failure()
        run: make docker-logs || docker compose -f docker/docker-compose.yml logs
      - name: Teardown
        if: always()
        run: make docker-down || true
