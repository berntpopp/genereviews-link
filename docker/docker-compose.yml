services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: genereview_link_postgres
    environment:
      POSTGRES_DB: genereview
      POSTGRES_USER: ${POSTGRES_USER:-genereview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genereview}
    volumes:
      - genereview_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-genereview}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  genereview-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: genereview_link_server

    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false

    environment:
      GENEREVIEW_LINK_LOG_LEVEL: INFO
      GENEREVIEW_LINK_HOST: 0.0.0.0
      GENEREVIEW_LINK_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-genereview}:${POSTGRES_PASSWORD:-genereview}@postgres:5432/genereview

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "${GENEREVIEW_LINK_PORT:-8000}:8000"

    command: ["genereview-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  genereview_pg_data:
