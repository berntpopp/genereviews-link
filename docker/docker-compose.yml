# Explicit project name isolates this stack. Without it, Compose defaults the project to the
# parent-dir basename ("docker"), shared by every -link repo that roots its compose at
# docker/docker-compose.yml — pooling unrelated containers/volumes into one "docker" project
# and triggering spurious orphan-container warnings (and making --remove-orphans able to delete
# a sibling stack). See https://docs.docker.com/reference/compose-file/version-and-name/
# NOTE: this changes Compose's named-volume prefix; on a host with an existing
# docker_genereview_pg_data volume, migrate the data on next redeploy (do not recreate blindly).
name: genereviews-link

services:
  postgres:
    # Pinned by digest (Hardening Standard v1 §1): index digest from
    # `docker buildx imagetools inspect pgvector/pgvector:0.8.2-pg18`.
    image: pgvector/pgvector:0.8.2-pg18@sha256:42e7f6b4e1eceb02ff14e3e6bc6108bbe259abbe83879dc1845d0da1ddeb555d
    container_name: genereview_link_postgres
    environment:
      POSTGRES_DB: genereview
      POSTGRES_USER: ${POSTGRES_USER:-genereview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genereview}
    volumes:
      - genereview_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-genereview}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  genereview-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: genereview_link_server

    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false

    environment:
      GENEREVIEW_LINK_LOG_LEVEL: INFO
      GENEREVIEW_LINK_HOST: 0.0.0.0
      GENEREVIEW_LINK_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-genereview}:${POSTGRES_PASSWORD:-genereview}@postgres:5432/genereview

    depends_on:
      postgres:
        condition: service_healthy

    # Dev/local only — loopback-bound (127.0.0.1) so copying this file to a
    # server never publishes the unauthenticated backend on the public IP
    # (Docker would otherwise bind 0.0.0.0 and bypass the host firewall).
    # Production fronts the container with a reverse proxy via the prod/npm
    # overlays (ports: !reset []). Backends are unauthenticated by design.
    ports:
      - "127.0.0.1:${GENEREVIEW_LINK_PORT:-8000}:8000"

    command: ["genereview-link", "serve", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    restart: unless-stopped

    # Runtime hardening (read_only rootfs + tmpfs, cap_drop: ALL,
    # no-new-privileges, init, pids_limit) is applied by the prod overlay
    # (docker-compose.prod.yml) and inherited by the npm path
    # (base + prod + npm). The base file is the unhardened dev/foundation layer.

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  genereview-link-embed:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    profiles: ["embed"]

    command: ["genereview-link", "embed"]

    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-genereview}:${POSTGRES_PASSWORD:-genereview}@postgres:5432/genereview

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      disable: true

volumes:
  genereview_pg_data:
