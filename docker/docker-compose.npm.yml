# Nginx Proxy Manager overlay
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.npm.yml up -d
#
# The proxy reaches the app on npm-network. The app keeps `default` (NCBI E-utilities) and
# `genereview_internal` (PostgreSQL, which has no route off the host).

services:
  genereview-link:
    environment:
      MCP_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","genereviews-link.genefoundry.org"]'
    ports: !reset []
    expose:
      - "8000"
    networks:
      - default
      - genereview_internal
      - npm-network

networks:
  npm-network:
    external: true
    name: ${NPM_NETWORK_NAME:-npm_network}
